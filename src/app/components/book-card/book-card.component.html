<article class="card" tabindex="0" (keyup.enter)="onView()" role="article" [attr.aria-label]="book.title">

  <img
    [src]="getCoverUrl()"
    [alt]="'Cover of ' + book.title"
    class="cover"
    loading="lazy"
  />

  <div class="card-content">
    <h3 class="book-title">{{ book.title | titlecase }}</h3>
    <p class="author">✍️ {{ book.author_name?.[0] || 'Unknown Author' }}</p>

    <div class="meta">
      <span *ngIf="book.first_publish_year" class="year">
        📅 {{ book.first_publish_year }}
      </span>
      <span *ngIf="book.edition_count" class="editions">
        📖 {{ book.edition_count }} editions
      </span>
    </div>

    <!-- StatusBadge child component - @Input/@Output demonstrated -->
    <app-status-badge *ngIf="book.first_publish_year" [year]="book.first_publish_year"></app-status-badge>

    <button class="view-btn" (click)="onView()" [attr.aria-label]="'View details for ' + book.title">
      View Details →
    </button>
  </div>

</article>

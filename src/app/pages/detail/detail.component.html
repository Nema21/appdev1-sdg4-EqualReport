<h2>Book Details</h2>

<div *ngIf="book$ | async as book; else loading">
  <div *ngIf="book; else notFound">
    <h3>{{ book.title }}</h3>
    <p>{{ book.author_name?.[0] }}</p>
    <p>{{ book.first_publish_year }}</p>
  </div>
</div>

<ng-template #loading>Loading...</ng-template>
<ng-template #notFound>Not found</ng-template>

<main class="dashboard">
  <header class="dash-header">
    <h2 class="title">📚 Educational Books</h2>
    <p class="subtitle">Discover free learning resources — SDG 4: Quality Education</p>

    <!-- Search Bar -->
    <div class="search-bar">
      <input
        type="text"
        placeholder="Search by subject (e.g. science, math, history)..."
        aria-label="Search books by subject"
        #searchInput
        (keyup.enter)="onSearch(searchInput.value)"
      />
      <button (click)="onSearch(searchInput.value)" aria-label="Search">🔍 Search</button>
      <button class="reset-btn" (click)="onSearch(''); searchInput.value=''" aria-label="Reset search">✕</button>
    </div>

    <!-- Summary Line using Signals -->
    <p class="search-summary">{{ searchSummary() }} | Total: {{ totalBooks() }} books</p>
  </header>

  <!-- Loading State -->
  <div *ngIf="loading()" class="loading" role="status" aria-live="polite">
    <div class="spinner"></div>
    <p>Loading books...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error()" class="error" role="alert">
    ❌ Failed to load books. Please check your connection and try again.
    <button (click)="loadBooks('education')">Retry</button>
  </div>

  <!-- Books Grid -->
  <section class="grid" *ngIf="books$ | async as data" aria-label="Books list">
    <app-book-card
      *ngFor="let book of data.works"
      [book]="book"
      (view)="viewDetails($event)">
    </app-book-card>
  </section>
</main>

  <!-- Notes Section -->
<section class="notes-section">
  <div class="notes-card">

    <h3>📝 Study Notes</h3>

    <p class="notes-subtitle">
      Save quick learning notes while exploring books.
    </p>

    <textarea
      [(ngModel)]="notes"
      (input)="onNotesChange()"
      rows="6"
      placeholder="Write your study notes here..."
    ></textarea>

  </div>
</section>

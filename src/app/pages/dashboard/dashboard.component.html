<h2 class="title">Learning Resources (SDG 4)</h2>

<div *ngIf="books$ | async as books; else loading">
  <div class="grid">
    <div class="card" *ngFor="let b of books">
      <h3>{{ b.title }}</h3>
      <p>Author: {{ b.author }}</p>
    </div>
  </div>
</div>

<ng-template #loading>
  Loading books...
</ng-template>
